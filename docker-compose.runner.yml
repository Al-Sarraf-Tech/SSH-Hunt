services:
  github-runner:
    image: myoung34/github-runner:ubuntu-jammy
    container_name: ssh-hunt-gh-runner
    restart: unless-stopped
    env_file:
      - .env.runner
    environment:
      RUNNER_SCOPE: repo
      RUNNER_WORKDIR: /tmp/runner/work
      RUNNER_EPHEMERAL: ${RUNNER_EPHEMERAL:-false}
      RUNNER_NAME: ${RUNNER_NAME:-ssh-hunt-runner-01}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volumes/gh-runner:/tmp/runner
    security_opt:
      - no-new-privileges:true

  github-runner-ephemeral-1:
    image: myoung34/github-runner:ubuntu-jammy
    container_name: ssh-hunt-gh-runner-ephemeral-1
    restart: unless-stopped
    env_file:
      - .env.runner
    environment:
      RUNNER_SCOPE: repo
      RUNNER_WORKDIR: /tmp/runner/work
      RUNNER_EPHEMERAL: true
      RUNNER_NAME: ${RUNNER_NAME_PREFIX:-ssh-hunt-runner}-ephemeral-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volumes/gh-runner-ephemeral-1:/tmp/runner
    security_opt:
      - no-new-privileges:true

